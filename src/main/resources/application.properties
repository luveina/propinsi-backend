# Load .env file for local development (optional - won't fail if not found)
spring.config.import=optional:file:.env[.properties]

# ==========================================
# 1. KONFIGURASI DATABASE
# ==========================================
spring.datasource.url=jdbc:postgresql://${PGHOST}/${PGDATABASE}?sslmode=${PGSSLMODE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


# ==========================================
# 2. KONFIGURASI JWT
# ==========================================
silobur.app.jwtSecret=${JWT_SECRET}
silobur.app.jwtExpirationMs=86400000

spring.jackson.time-zone=UTC
spring.jackson.serialization.write-dates-as-timestamps=false      
spring.jpa.properties.hibernate.jdbc.time_zone=UTC      