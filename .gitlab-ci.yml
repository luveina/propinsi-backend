# =============================================================
# GitLab CI/CD – propinsi-backend (Spring Boot)
#
# Pipeline stages:
#   build  → compile + unit test with Maven
#   docker → build Docker image and push to GitLab Container Registry
#   deploy → (optional placeholder) trigger Koyeb re-deployment
#
# All credentials are supplied via GitLab predefined CI/CD variables
# – no hardcoded secrets.
# =============================================================

stages:
  - build
  - docker
  - deploy

variables:
  # Maven local repo inside the project so it is cached between jobs
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  # Full image reference, e.g. registry.gitlab.com/group/project
  IMAGE_NAME: $CI_REGISTRY_IMAGE/backend

# ─────────────────────────────────────────────
# Cache Maven dependencies between pipeline runs
# ─────────────────────────────────────────────
cache:
  paths:
    - .m2/repository

# =============================================================
# Stage 1 – BUILD (compile + test)
# =============================================================
maven-build:
  stage: build
  image: eclipse-temurin:17-jdk-alpine
  before_script:
    - chmod +x mvnw
  script:
    - ./mvnw verify -B
  artifacts:
    # Pass the compiled JAR to the docker stage without rebuilding
    paths:
      - target/*.jar
    expire_in: 1 hour
    reports:
      # Publish Surefire XML test results in the GitLab MR widget
      junit:
        - target/surefire-reports/TEST-*.xml

# =============================================================
# Stage 2 – DOCKER (build image and push to GitLab Registry)
# =============================================================
docker-build-push:
  stage: docker
  # Docker-in-Docker service
  image: docker:26
  services:
    - docker:26-dind
  variables:
    # Use the Docker daemon started by the dind service
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
  dependencies:
    - maven-build   # download JAR artifact from the build stage
  before_script:
    # Authenticate to the GitLab Container Registry using predefined variables
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin
  script:
    # Build once, tag with both :latest and the immutable commit SHA
    - |
      docker build \
        --tag "$IMAGE_NAME:latest" \
        --tag "$IMAGE_NAME:$CI_COMMIT_SHA" \
        .
    - docker push "$IMAGE_NAME:latest"
    - docker push "$IMAGE_NAME:$CI_COMMIT_SHA"
  after_script:
    - docker logout "$CI_REGISTRY"
  # Only push images from the default branch (e.g. main/master)
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

# =============================================================
# Stage 3 – DEPLOY (trigger Koyeb re-deployment)
#
# Koyeb watches your container registry and redeploys
# automatically when a new image is pushed.  If you prefer to
# trigger deployments via the Koyeb CLI / API instead, fill in
# the variables below and uncomment this job.
#
# Required GitLab CI/CD variable (Settings → CI/CD → Variables):
#   KOYEB_TOKEN  – your Koyeb API token (mark as "masked")
# =============================================================

